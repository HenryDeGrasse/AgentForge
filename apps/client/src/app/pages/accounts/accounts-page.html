<div class="container">
  <div class="row">
    <div class="col">
      <div
        class="page-title-row d-none d-sm-flex align-items-center justify-content-center mb-4"
      >
        <h1 class="h3 mb-0" i18n>Accounts</h1>
        @if (hasPermissionToAccessAi && accounts?.length) {
          <button
            class="ask-ai-btn ms-3"
            title="Ask AI Advisor about your accounts"
            type="button"
            (click)="onAskAiAboutAccounts()"
          >
            <span aria-hidden="true" class="ask-ai-icon">✦</span>
            Ask AI
          </button>
        }
      </div>
      <gf-accounts-table
        [accounts]="accounts"
        [activitiesCount]="activitiesCount"
        [baseCurrency]="user?.settings?.baseCurrency"
        [locale]="user?.settings?.locale"
        [showActions]="
          !hasImpersonationId &&
          hasPermissionToUpdateAccount &&
          !user.settings.isRestrictedView
        "
        [totalBalanceInBaseCurrency]="totalBalanceInBaseCurrency"
        [totalValueInBaseCurrency]="totalValueInBaseCurrency"
        (accountDeleted)="onDeleteAccount($event)"
        (accountToUpdate)="onUpdateAccount($event)"
        (transferBalance)="onTransferBalance()"
      />
    </div>
  </div>

  @if (
    !hasImpersonationId &&
    hasPermissionToCreateAccount &&
    !user.settings.isRestrictedView
  ) {
    <div class="fab-container">
      <a
        class="align-items-center d-flex justify-content-center"
        color="primary"
        mat-fab
        [queryParams]="{ createDialog: true }"
        [routerLink]="[]"
      >
        <ion-icon name="add-outline" size="large" />
      </a>
    </div>
  }
</div>
